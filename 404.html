<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | The Pittsburgh Wire</title>
  <meta name="description" content="The page you are looking for does not exist." />
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://www.thepittsburghwire.com" />
  <style>
    :root {
      --ink: #0f0e0c;
      --paper: #f5f0e8;
      --accent: #b5001f;
      --smoke: #6b6355;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Serif 4', Georgia, serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 72px;
      font-weight: 900;
      margin-bottom: 10px;
      color: var(--accent);
    }
    h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: var(--smoke);
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
      color: var(--ink);
    }
    a {
      display: inline-block;
      padding: 12px 30px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    a:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Sorry, the page you are looking for does not exist. Please check the URL or return to our homepage to find what you are looking for.</p>
    <a href="/">Return to Homepage</a>
  </div>
</body>
</html>
